<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Poison Flower — Sprint</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent: #8b6f47;
    --bg: #191919;
    --border: rgba(255,255,255,0.08);
    --text: #f0ece4;
    --muted: rgba(240,236,228,0.35);
    --danger: #e07a5f;
    --green: #81b29a;
    --mono: 'DM Mono', monospace;
  }

  html, body {
    height: auto;
    margin: 0;
    padding: 0;
    background: #191919;
    font-family: var(--mono);
    color: var(--text);
  }

  .card {
    width: 100%;
      display: flex;
    flex-direction: column;
      padding: 2rem;
    border: none;
    gap: 1.25rem;
  }

  .top-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
  }

  .title {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #c9a45a;
  }

  .status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #c9a45a;
    white-space: nowrap;
    border: 1px solid #c9a45a;
    border-radius: 99px;
    padding: 3px 8px;
  }

  .live {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--green);
    animation: blink 2s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.2; }
  }

  .center {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.3rem;
  }

  .day-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }

  .day-num {
    font-size: 80px;
    font-weight: 500;
    line-height: 1;
    letter-spacing: -0.04em;
    color: var(--text);
  }

  .day-num.urgent { color: var(--danger); }
  .day-num.done   { color: var(--green); }

  .day-of {
    font-size: 20px;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  .subheader {
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .bottom {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }

  .bar-track {
    width: 100%;
    height: 2px;
    background: rgba(255,255,255,0.07);
    border-radius: 99px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    background: #c9a45a;
    border-radius: 99px;
  }

  .dates {
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  .dates span:last-child { color: #c9a45a; }
</style>
</head>
<body>
<div class="card">

  <div class="top-row">
    <div class="title">The Poison Flower</div>
    <div class="status"><span class="live"></span>Sprint Active</div>
  </div>

  <div class="center">
    <div class="day-row">
      <div class="day-num" id="num">--</div>
      <div class="day-of">/ 30</div>
    </div>
    <div class="subheader">Director Attachment Sprint</div>
  </div>

  <div class="bottom">
    <div class="bar-track">
      <div class="bar-fill" id="bar" style="width:0%"></div>
    </div>
    <div class="dates">
      <span>Jun 1, 2026</span>
      <span>Jul 1, 2026</span>
    </div>
  </div>

</div>

<script>
  const START = new Date(2026, 5, 1);
  const TOTAL = 30;

  const now  = new Date();
  const day  = Math.min(TOTAL, Math.max(1, Math.floor((now - START) / 86400000) + 1));
  const pct  = Math.round((day / TOTAL) * 100);

  const el = document.getElementById('num');
  el.textContent = day;
  if (day >= TOTAL)   el.classList.add('done');
  else if (day >= 25) el.classList.add('urgent');

  document.getElementById('bar').style.width = pct + '%';
</script>
</body>
</html>
